spring.application.name=demosec

################ SERVER ################
server.port=8081
server.servlet.context-path=/springsecurity

################ DATABASE ################
spring.datasource.url=jdbc:mysql://localhost:3306/demospringsecurity?createDatabaseIfNotExist=true&serverTimezone=UTC
spring.datasource.username=root
spring.datasource.password=
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.jackson.serialization.write-dates-as-timestamps=false
spring.jackson.deserialization.fail-on-unknown-properties=false

################ JPA ################
spring.jpa.hibernate.ddl-auto=update

spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
# spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect (Removed as it is deprecated and auto-detected)
logging.level.org.springframework.security.config.annotation.authentication.configuration.InitializeUserDetailsBeanManagerConfigurer=ERROR

spring.sql.init.mode=never
spring.sql.init.data-locations=classpath:data.sql

################ JWT ################
app.jwt.secret=MySuperSecretKeyForJwtAuthSpringSecurity2026MySuperSecretKey
app.jwt.expiration-ms=3600000

################ STRIPE CONFIGURATION ################
# Use your actual Stripe keys from https://dashboard.stripe.com/
stripe.api.key=${STRIPE_API_KEY:sk_test_YOUR_TEST_KEY_HERE}
stripe.publishable.key=${STRIPE_PUBLISHABLE_KEY:pk_test_YOUR_TEST_KEY_HERE}
stripe.webhook.secret=${STRIPE_WEBHOOK_SECRET:whsec_test_YOUR_WEBHOOK_SECRET_HERE}
stripe.webhook.endpoint=/api/pharmacy/payments/webhook/stripe
stripe.api.version=2024-04-10

################ D17 CONFIGURATION ################
# D17 Payment Gateway Configuration
d17.api.key=${D17_API_KEY:d17_test_YOUR_TEST_KEY_HERE}
d17.merchant.id=${D17_MERCHANT_ID:MERCHANT_ID_HERE}
d17.api.url=https://api.d17.tn/
d17.webhook.secret=${D17_WEBHOOK_SECRET:whsec_d17_YOUR_SECRET_HERE}
d17.webhook.endpoint=/api/pharmacy/payments/webhook/d17

################ PAYMENT CONFIGURATION ################
payment.timeout.seconds=30
payment.max.attempts=3
payment.minimum.amount=0.100
payment.currency=TND

# Multipart
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

