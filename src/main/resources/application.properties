spring.application.name=demosec

################ SERVER ################
server.port=8081
server.servlet.context-path=/springsecurity

################ DATABASE ################
spring.datasource.url=jdbc:mysql://localhost:3306/demospringsecurity?createDatabaseIfNotExist=true&serverTimezone=UTC
spring.datasource.username=root
spring.datasource.password=
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

################ JPA ################
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.database-platform=org.hibernate.dialect.MySQL8Dialect
spring.jpa.open-in-view=false

################ JWT ################
app.jwt.secret=MySuperSecretKeyForJwtAuthSpringSecurity2026MySuperSecretKey
app.jwt.expiration-ms=3600000
logging.level.com.aziz.demosec.security.jwt=DEBUG
################ LOGGING ################
logging.level.org.springframework.security=DEBUG
server.tomcat.max-http-form-post-size=50MB
server.tomcat.max-swallow-size=50MB
