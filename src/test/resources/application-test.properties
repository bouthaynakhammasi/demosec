# Configuration pour les tests unitaires et intégration
spring.application.name=demosec-test

################ SERVER ################
server.port=0
server.servlet.context-path=/springsecurity

################ DATABASE (H2) ################
spring.datasource.url=jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=false;MODE=MySQL
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=password

################ JPA ################
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

################ SQL INIT ################
spring.sql.init.mode=never

# Mail configuration for tests
spring.mail.host=localhost
spring.mail.port=2525
spring.mail.username=test
spring.mail.password=test

################ JWT ################
app.jwt.secret=TestSecretKeyForJwtAuthSpringSecurity2026TestSecretKeyForJwtAuthSpringSecurity2026
app.jwt.expiration-ms=3600000

################ STRIPE / D17 (MOCKED) ################
stripe.api.key=sk_test_mock
stripe.publishable.key=pk_test_mock
stripe.webhook.secret=whsec_test_mock
d17.api.key=d17_test_mock
d17.merchant.id=mock_merchant
d17.webhook.secret=whsec_d17_mock
