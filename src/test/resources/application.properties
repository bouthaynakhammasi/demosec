# Test Configuration for Spring Boot Application
spring.application.name=demosec

# H2 Database Configuration (In-memory for tests)
spring.datasource.url=jdbc:h2:mem:testdb
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# JPA Configuration
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false

# H2 Console (Optional - for debugging)
spring.h2.console.enabled=true

# Logging Configuration
logging.level.root=WARN
logging.level.com.aziz.demosec=DEBUG
logging.level.org.springframework.security=WARN

# Test Transaction Management
spring.test.database.replace=any

# Disable some auto-configurations for testing
# spring.autoconfigure.exclude=org.springframework.boot.autoconfigure.jdbc.DataSourceAutoConfiguration

# JWT Configuration
jwt.secret=testSecretKeyForJWTTokenGenerationAndValidationInTests1234567890
jwt.expiration=86400000
jwt.refresh.expiration=604800000

# File Upload Configuration
file.upload.dir=target/test-uploads/

# WebSocket Configuration
spring.websocket.enabled=false

