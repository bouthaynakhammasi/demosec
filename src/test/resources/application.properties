# Use H2 in-memory database for tests
# Added MODE=MySQL and CASE_INSENSITIVE_IDENTIFIERS=TRUE for better compatibility
spring.datasource.url=jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1;MODE=MySQL;CASE_INSENSITIVE_IDENTIFIERS=TRUE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=password

# Hibernate settings for H2
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=true

# JWT settings for tests
app.jwt.secret=TestSecretKeyForAntigravityUnitTesting1234567890
app.jwt.expiration-ms=3600000

# Server settings for tests
server.servlet.context-path=/springsecurity
