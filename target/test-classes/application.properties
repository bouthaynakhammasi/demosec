spring.application.name=demosec

# H2 Database Configuration (In-memory for tests)
spring.datasource.url=jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1;MODE=MySQL;CASE_INSENSITIVE_IDENTIFIERS=TRUE;NON_KEYWORDS=USER,USERS
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# JPA Configuration
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false

# Server settings for tests
server.servlet.context-path=/springsecurity

################ JWT ################
app.jwt.secret=MySuperSecretKeyForJwtAuthSpringSecurity2026MySuperSecretKey
app.jwt.expiration-ms=3600000

