spring.application.name=demosec

################ SERVER ################
server.port=8081
server.servlet.context-path=/springsecurity

################ DATABASE ################
spring.datasource.url=jdbc:mysql://localhost:3306/demospringsecurity?createDatabaseIfNotExist=true&serverTimezone=UTC
spring.datasource.username=${DB_USERNAME:root}
spring.datasource.password=${DB_PASSWORD:}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

################ JPA ################
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.database-platform=org.hibernate.dialect.MySQL8Dialect

################ JWT ################
app.jwt.secret=${APP_JWT_SECRET}
app.jwt.expiration-ms=3600000

################ GOOGLE OAUTH2 ################
spring.security.oauth2.client.registration.google.client-id=${GOOGLE_CLIENT_ID}
spring.security.oauth2.client.registration.google.client-secret=${GOOGLE_CLIENT_SECRET}
spring.security.oauth2.client.registration.google.scope=openid,profile,email
spring.security.oauth2.client.registration.google.redirect-uri={baseUrl}/login/oauth2/code/{registrationId}

################ FRONTEND ################
app.frontend.google-callback=http://localhost:4200/auth/google/callback

################ EMAIL ################
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=${MAIL_USERNAME}
spring.mail.password=${MAIL_PASSWORD}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

################ OTP ################
app.otp.expiration-minutes=10