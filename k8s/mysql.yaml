apiVersion: v1
kind: Service
metadata:
  name: mysql-service
spec:
  ports:
    - port: 3306
  selector:
    app: mysql
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: mysql-deployment
spec:
  selector:
    matchLabels:
      app: mysql
  template:
    metadata:
      labels:
        app: mysql
    spec:
      containers:
      - image: mariadb:10.6
        name: mysql
        env:
        - name: MYSQL_ROOT_PASSWORD
          value: "root-password" # Change this according to security best practices
        - name: MYSQL_DATABASE
          value: "demospringsecurity"
        ports:
        - containerPort: 3306
          name: mysql
