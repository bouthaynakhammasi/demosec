apiVersion: v1
kind: Service
metadata:
  name: medicarepi-frontend-service
spec:
  type: NodePort
  ports:
    - port: 80
      targetPort: 80
      nodePort: 30002
  selector:
    app: medicarepi-frontend
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: medicarepi-frontend-deployment
spec:
  replicas: 2
  selector:
    matchLabels:
      app: medicarepi-frontend
  template:
    metadata:
      labels:
        app: medicarepi-frontend
    spec:
      containers:
      - name: frontend
        image: azizmelki/medicarepi-frontend:latest
        ports:
        - containerPort: 80
        env:
        - name: API_BASE_URL
          value: "http://medicarepi-backend-service:8081/springsecurity"
        # Mount the custom nginx configuration directly
        volumeMounts:
        - name: config-volume
          mountPath: /etc/nginx/conf.d/default.conf
          subPath: default.conf
      # Define the volume pulling from the ConfigMap
      volumes:
      - name: config-volume
        configMap:
          name: nginx-config
